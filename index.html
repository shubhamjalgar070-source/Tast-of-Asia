<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Taste of Asia Smart Review Helper</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111;
      color: #fff;
      padding: 12px;
    }

    .container {
      width: 100%;
      max-width: 560px;
      margin: 0 auto;
    }

    h1 {
      margin: 8px 0 4px;
      text-align: center;
      font-size: 24px;
    }

    .sub {
      text-align: center;
      color: #ccc;
      font-size: 13px;
      margin-bottom: 12px;
    }

    .card {
      background: #1c1c1c;
      border-radius: 14px;
      padding: 14px;
      margin-top: 12px;
    }

    label {
      display: block;
      text-align: left;
      margin: 10px 0 6px;
      font-size: 14px;
    }

    select, input, textarea, button {
      width: 100%;
      border: none;
      border-radius: 10px;
      padding: 12px;
      font-size: 16px;
    }

    select, input, textarea {
      background: #fff;
      color: #222;
    }

    textarea {
      min-height: 170px;
      resize: vertical;
    }

    button {
      background: #ff5722;
      color: #fff;
      font-weight: bold;
      margin-top: 10px;
      cursor: pointer;
    }

    button.secondary {
      background: #2a2a2a;
      border: 1px solid #444;
    }

    .hidden {
      display: none;
    }

    .photo {
      width: 100%;
      border-radius: 12px;
      margin-top: 12px;
      background: #fff;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 8px;
    }

    .chip {
      width: auto;
      padding: 10px 12px;
      border-radius: 999px;
      background: #2a2a2a;
      color: #fff;
      border: 1px solid #444;
      cursor: pointer;
      font-size: 14px;
      margin-top: 0;
    }

    .chip.active {
      background: #ff5722;
      border-color: #ff5722;
    }

    .stars {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin-top: 10px;
    }

    .star {
      width: 48px;
      height: 48px;
      border-radius: 10px;
      border: 1px solid #444;
      background: #2a2a2a;
      color: #fff;
      font-size: 18px;
      cursor: pointer;
      margin-top: 0;
    }

    .star.active {
      background: #ff5722;
      border-color: #ff5722;
    }

    .two-col {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
    }

    .popup {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.82);
      z-index: 999;
      padding: 16px;
    }

    .popup-box {
      background: #fff;
      color: #222;
      width: 100%;
      max-width: 430px;
      margin: 10vh auto 0;
      padding: 16px;
      border-radius: 16px;
    }

    .popup-box img {
      width: 100%;
      border-radius: 12px;
      margin-bottom: 10px;
    }

    @media (min-width: 540px) {
      .two-col {
        grid-template-columns: 1fr 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>⭐ Taste of Asia</h1>
    <div class="sub">A quick helper for genuine customer reviews</div>

    <div class="card">
      <label for="mode">Review type</label>
      <select id="mode" onchange="switchMode()">
        <option value="food">Food Review</option>
        <option value="general">General Experience</option>
      </select>

      <label>Your rating</label>
      <div class="stars">
        <button type="button" class="star" onclick="setRating(1)">1</button>
        <button type="button" class="star" onclick="setRating(2)">2</button>
        <button type="button" class="star" onclick="setRating(3)">3</button>
        <button type="button" class="star" onclick="setRating(4)">4</button>
        <button type="button" class="star active" onclick="setRating(5)">5</button>
      </div>
    </div>

    <div class="card" id="foodBox">
      <label for="dish">Choose food</label>
      <select id="dish" onchange="showFood()">
        <option value="mixed">Mixed Grill</option>
        <option value="salad">Salad</option>
        <option value="curry">Curry</option>
        <option value="rice">Fried Rice</option>
      </select>

      <img id="foodImg" class="photo" alt="Food preview" />
      <button type="button" class="secondary" onclick="openPopup()">See Image</button>

      <label>Food suggestions</label>
      <div class="chips" id="foodChips"></div>
    </div>

    <div class="card hidden" id="generalBox">
      <label for="generalType">Choose category</label>
      <select id="generalType" onchange="renderGeneralChips()">
        <option value="service">Service</option>
        <option value="hospitality">Hospitality</option>
        <option value="staff">Staff</option>
        <option value="cleanliness">Cleanliness</option>
        <option value="atmosphere">Atmosphere</option>
      </select>

      <label>General suggestions</label>
      <div class="chips" id="generalChips"></div>
    </div>

    <div class="card">
      <div class="two-col">
        <div>
          <label for="likedMost">What did you like most?</label>
          <input id="likedMost" placeholder="Example: mixed grill, flavour, friendly welcome" />
        </div>
        <div>
          <label for="serviceText">How was the service?</label>
          <input id="serviceText" placeholder="Example: quick, smooth, polite" />
        </div>
      </div>

      <div class="two-col">
        <div>
          <label for="atmText">How was the atmosphere?</label>
          <input id="atmText" placeholder="Example: relaxed, comfortable, warm" />
        </div>
        <div>
          <label for="portionText">How was the food or portion?</label>
          <input id="portionText" placeholder="Example: fresh, generous, well cooked" />
        </div>
      </div>

      <div class="two-col">
        <div>
          <label for="visitType">Why were you visiting?</label>
          <input id="visitType" placeholder="Example: dinner, takeaway, family meal" />
        </div>
        <div>
          <label for="returnVisit">Would you come again?</label>
          <select id="returnVisit">
            <option value="yes">Yes</option>
            <option value="maybe">Maybe</option>
            <option value="no">No</option>
          </select>
        </div>
      </div>
    </div>

    <div class="card">
      <label for="reviewBox">Review draft</label>
      <textarea id="reviewBox" placeholder="Your draft will appear here..."></textarea>
      <button type="button" onclick="buildDraft()">Make Smart Draft</button>
      <button type="button" class="secondary" onclick="copyDraft()">Copy Text</button>
      <button type="button" class="secondary" onclick="copyDraftWithImage()">Copy Text + Image</button>
      <button type="button" onclick="openGoogle()">Open Google Review Page</button>
    </div>
  </div>

  <div class="popup" id="popup">
    <div class="popup-box">
      <img id="popupImg" alt="Dish image" />
      <p id="popupCaption"></p>
      <button type="button" onclick="closePopup()">Close</button>
    </div>
  </div>

  <script>
    const googleLink = "https://share.google/PzwDetBV8km3wIP3y";
    let rating = 5;

    const foodData = {
      mixed: {
        name: "Mixed Grill",
        img: "https://i.postimg.cc/LnwwfXm2/IMG-20260318-WA0000.jpg",
        cap: "Mixed grill platter with chicken tikka and chips.",
        chips: [
          "Tandoori Mixed Grill was amazing",
          "great portion size",
          "full of flavour",
          "food was hot and fresh",
          "grilled items looked perfectly cooked",
          "the platter looked full and satisfying",
          "food was cooked perfectly",
          "amazing flavours and spices"
        ]
      },
      salad: {
        name: "Salad",
        img: "https://i.postimg.cc/mtJJMDT2/IMG-20260318-WA0001.jpg",
        cap: "Fresh salad with dressing.",
        chips: [
          "fresh ingredients clearly visible",
          "food looked fresh and very appetizing",
          "beautiful colours and textures",
          "very appealing presentation",
          "light and fresh",
          "nicely presented",
          "looked inviting",
          "fresh and satisfying"
        ]
      },
      curry: {
        name: "Curry",
        img: "https://i.postimg.cc/rK33Wmqz/IMG-20260318-WA0006.jpg",
        cap: "Rich curry with tender meat.",
        chips: [
          "rich and tasty",
          "full of flavour",
          "curry had a rich texture",
          "the curry looked thick and tasty",
          "tender meat",
          "looked authentic",
          "great spice level",
          "food was well balanced"
        ]
      },
      rice: {
        name: "Fried Rice",
        img: "https://i.postimg.cc/fJppXLML/IMG-20260318-WA0004.jpg",
        cap: "Fried rice with toppings.",
        chips: [
          "nicely cooked",
          "rice dish was nicely presented",
          "fresh and tasty",
          "good portion sizes",
          "well seasoned",
          "looked very inviting",
          "very satisfying meal",
          "food was hot and fresh"
        ]
      }
    };

    const generalData = {
      service: [
        "great service and quick delivery",
        "service was fast and staff were very helpful",
        "service was smooth and quick",
        "really impressed with the service quality",
        "service was quick even during busy time",
        "very professional service",
        "food came quickly and was fresh",
        "good service and nice environment",
        "everything was perfect including service",
        "friendly staff and quick service"
      ],
      hospitality: [
        "staff were polite and welcoming",
        "lovely atmosphere and excellent customer service",
        "friendly staff and great hospitality",
        "staff were attentive and kind",
        "warm welcome and great food",
        "good customer care",
        "staff were smiling and helpful",
        "excellent hospitality",
        "staff made us feel comfortable",
        "very welcoming"
      ],
      staff: [
        "the team was very polite and helpful",
        "friendly staff",
        "staff explained menu very nicely",
        "staff were attentive and kind",
        "staff were smiling and helpful",
        "helpful and respectful team",
        "polite and welcoming",
        "staff made the experience better",
        "staff were very welcoming",
        "good interaction with staff"
      ],
      cleanliness: [
        "very clean place",
        "clean place and nice food",
        "clean and comfortable environment",
        "neat and clean presentation",
        "well maintained",
        "clean dining area",
        "good hygiene",
        "tidy and organised",
        "clean and fresh",
        "comfortable and clean"
      ],
      atmosphere: [
        "nice ambience and service",
        "lovely atmosphere",
        "good experience overall",
        "nice place for family dinner",
        "great place for dinner with friends",
        "nice environment",
        "pleasant setting",
        "comfortable atmosphere",
        "warm environment",
        "good vibe inside"
      ]
    };

    const foodOpeners = [
      "I ordered the",
      "I had the",
      "I tried the",
      "I went for the"
    ];

    const generalOpeners = [
      "I had a good visit",
      "I enjoyed my visit",
      "I had a nice experience",
      "I had a comfortable visit"
    ];

    let foodOpenerIndex = 0;
    let generalOpenerIndex = 0;

    let selectedFoodChips = [];
    let selectedGeneralChips = [];

    function switchMode() {
      const mode = document.getElementById("mode").value;
      document.getElementById("foodBox").classList.toggle("hidden", mode === "general");
      document.getElementById("generalBox").classList.toggle("hidden", mode === "food");
    }

    function setRating(value) {
      rating = value;
      const buttons = document.querySelectorAll(".star");
      buttons.forEach((btn, index) => {
        btn.classList.toggle("active", index < value);
      });
    }

    function showFood() {
      const key = document.getElementById("dish").value;
      document.getElementById("foodImg").src = foodData[key].img;
      renderFoodChips();
    }

    function renderFoodChips() {
      const key = document.getElementById("dish").value;
      const container = document.getElementById("foodChips");
      selectedFoodChips = [];
      container.innerHTML = "";

      foodData[key].chips.forEach(item => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "chip";
        btn.textContent = item;
        btn.onclick = () => toggleChip(item, btn, "food");
        container.appendChild(btn);
      });
    }

    function renderGeneralChips() {
      const key = document.getElementById("generalType").value;
      const container = document.getElementById("generalChips");
      selectedGeneralChips = [];
      container.innerHTML = "";

      generalData[key].forEach(item => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "chip";
        btn.textContent = item;
        btn.onclick = () => toggleChip(item, btn, "general");
        container.appendChild(btn);
      });
    }

    function toggleChip(item, btn, type) {
      const target = type === "food" ? selectedFoodChips : selectedGeneralChips;
      const i = target.indexOf(item);

      if (i === -1) {
        target.push(item);
        btn.classList.add("active");
      } else {
        target.splice(i, 1);
        btn.classList.remove("active");
      }
    }

    function buildDraft() {
      const mode = document.getElementById("mode").value;
      const likedMost = document.getElementById("likedMost").value.trim();
      const serviceText = document.getElementById("serviceText").value.trim();
      const atmText = document.getElementById("atmText").value.trim();
      const portionText = document.getElementById("portionText").value.trim();
      const visitType = document.getElementById("visitType").value.trim();
      const returnVisit = document.getElementById("returnVisit").value;

      let text = "";

      if (mode === "food") {
        const dishKey = document.getElementById("dish").value;
        const dishName = foodData[dishKey].name;
        const opener = foodOpeners[foodOpenerIndex];
        foodOpenerIndex = (foodOpenerIndex + 1) % foodOpeners.length;

        text = opener + " " + dishName;
        if (visitType) text += " during a " + visitType;
        text += ".";

        if (selectedFoodChips.length) {
          text += " It was " + selectedFoodChips.join(", ") + ".";
        }

        if (likedMost) {
          text += " What I liked most was " + likedMost + ".";
        }

        if (portionText) {
          text += " The food felt " + portionText + ".";
        }

        if (serviceText) {
          text += " The service was " + serviceText + ".";
        }

        if (atmText) {
          text += " The atmosphere felt " + atmText + ".";
        }
      } else {
        const generalType = document.getElementById("generalType").value;
        const opener = generalOpeners[generalOpenerIndex];
        generalOpenerIndex = (generalOpenerIndex + 1) % generalOpeners.length;

        text = opener;
        if (visitType) text += " during my " + visitType;
        text += " with the " + generalType + ".";

        if (selectedGeneralChips.length) {
          text += " It felt " + selectedGeneralChips.join(", ") + ".";
        }

        if (likedMost) {
          text += " What stood out most was " + likedMost + ".";
        }

        if (serviceText) {
          text += " The service felt " + serviceText + ".";
        }

        if (atmText) {
          text += " The atmosphere was " + atmText + ".";
        }

        if (portionText) {
          text += " Everything felt " + portionText + ".";
        }
      }

      if (rating >= 5) {
        text += " I would definitely come back again.";
      } else if (rating === 4 || returnVisit === "yes") {
        text += " I would happily visit again.";
      } else if (returnVisit === "maybe") {
        text += " I would consider visiting again.";
      } else {
        text += " It was okay overall.";
      }

      document.getElementById("reviewBox").value = text;
    }

    async function copyDraft() {
      const box = document.getElementById("reviewBox");
      box.select();
      box.setSelectionRange(0, 99999);
      await navigator.clipboard.writeText(box.value);
      alert("Text copied");
    }

    async function copyDraftWithImage() {
      const mode = document.getElementById("mode").value;
      const text = document.getElementById("reviewBox").value;

      try {
        if (mode !== "food") {
          await navigator.clipboard.writeText(text);
          alert("Text copied. No food image in General mode.");
          return;
        }

        const dishKey = document.getElementById("dish").value;
        const imageUrl = foodData[dishKey].img;

        if (!window.ClipboardItem) {
          await navigator.clipboard.writeText(text + "\n\nImage: " + imageUrl);
          alert("Text copied. Your browser does not support direct image copy, so the image link was added.");
          return;
        }

        const response = await fetch(imageUrl);
        const blob = await response.blob();

        await navigator.clipboard.write([
          new ClipboardItem({
            [blob.type]: blob,
            "text/plain": new Blob([text], { type: "text/plain" })
          })
        ]);

        alert("Text and image copied. Some apps may still require manual image upload.");
      } catch (error) {
        try {
          const dishKey = document.getElementById("dish").value;
          const imageUrl = mode === "food" ? foodData[dishKey].img : "";
          await navigator.clipboard.writeText(text + (imageUrl ? "\n\nImage: " + imageUrl : ""));
          alert("Text copied. Image was added as a link because direct image copy was not available.");
        } catch (fallbackError) {
          alert("Copy failed on this browser.");
        }
      }
    }

    function openGoogle() {
      window.open(googleLink, "_blank");
    }

    function openPopup() {
      const key = document.getElementById("dish").value;
      document.getElementById("popup").style.display = "block";
      document.getElementById("popupImg").src = foodData[key].img;
      document.getElementById("popupCaption").innerText = foodData[key].cap;
    }

    function closePopup() {
      document.getElementById("popup").style.display = "none";
    }

    showFood();
    renderGeneralChips();
  </script>
</body>
</html>
